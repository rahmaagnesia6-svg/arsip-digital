<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Arsip Rahma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body class="bg-slate-50 p-4 md:p-10">
    <div class="max-w-5xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Arsip Digital Publik</h1>
            <p class="text-slate-500">Daftar dokumen yang tersedia secara publik.</p>
        </div>

        <table id="tabelArsip" class="display w-full">
            <thead>
                <tr class="bg-slate-100">
                    <th class="py-3 text-left px-4">Nama Dokumen</th>
                    <th class="py-3 text-center px-4">Aksi</th>
                </tr>
            </thead>
            <tbody id="file-list"></tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script>
        const repoOwner = "rahmaagnesia6-svg"; 
        const repoName = "arsip-digital";
        const folderPath = "dokumen";

        async function fetchFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`);
                const files = await response.json();
                const tableBody = document.getElementById('file-list');

                files.forEach(file => {
                    if (file.name !== ".gitkeep" && file.type !== "dir") {
                        const row = `
                            <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                                <td class="py-4 px-4 font-medium text-slate-700">${file.name}</td>
                                <td class="py-4 text-center px-4">
                                    <a href="${file.download_url}" target="_blank" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700 shadow-sm transition">Buka / Unduh</a>
                                </td>
                            </tr>`;
                        tableBody.innerHTML += row;
                    }
                });

                $('#tabelArsip').DataTable({
                    responsive: true,
                    language: {
                        search: "Cari:",
                        lengthMenu: "_MENU_",
                        info: "_TOTAL_ dokumen"
                    }
                });
            } catch (error) {
                console.error("Gagal memuat data:", error);
            }
        }
        fetchFiles();
    </script>
</body>
</html>
